<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slot Machine - Marcas Deportivas</title>
  </head>

  <body>
    <div id="app">
      <div class="video">
        <div
          style="
            border-radius: 15px;
            overflow: hidden;
            display: inline-block;
            filter: drop-shadow(0 0 80px #c21f8c70)
              drop-shadow(0 0 80px #69239470);
          "
        >
          <iframe
            width="900"
            height="506"
            src="https://www.youtube-nocookie.com/embed/1waVVXZifCM"
            frameborder="0"
            allowfullscreen
          >
          </iframe>
        </div>
      </div>

      <div class="slots">
        <div class="reel"></div>
        <div class="reel"></div>
        <div class="reel"></div>
      </div>
      <div class="controls">
        <button id="spinButton" type="button">Girar</button>
      </div>

      <div class="info_section">
        <h2>¡Juega y gana!</h2>
        <p>Si obtienes tres logos iguales en la maquina, ganas al instante.</p>
      </div>
      <div id="acumulado"></div>
      <footer>
        <p>
          App desarrollada por
          <a href="https://market-support.com" target="_blank"
            >Market Support</a
          >
        </p>
        <div class="probability-controls">
          <button id="prob10" type="button" data-probability="10" title="10% Acierto">
            <span class="sr-only">10% Acierto</span>
          </button>
          <button id="prob20" type="button" data-probability="20" title="20% Acierto">
            <span class="sr-only">20% Acierto</span>
          </button>
          <button id="prob40" type="button" data-probability="40" title="40% Acierto">
            <span class="sr-only">40% Acierto</span>
          </button>
        </div>
      </footer>
    </div>
    <audio id="spinAudio" preload="auto"></audio>
    <audio id="winAudio" preload="auto"></audio>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
